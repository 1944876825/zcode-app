name: zcode_app
description: ZCode AI 编程助手移动客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 网络
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # 数据模型
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  flutter_markdown: ^0.7.4+3
  google_fonts: ^6.2.1

  # 工具
  uuid: ^4.5.1
  logger: ^2.5.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1
  flutter_animate: ^4.5.2
  crypto: ^3.0.7
  convert: ^3.1.2
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 代码生成
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
