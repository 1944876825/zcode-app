<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- ZCode app icon: deep blue-black background + white ">_" terminal prompt
       Brand: darkBg #08090A, accent #3B82F6 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1626"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.52" r="0.55">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <!-- subtle accent glow behind prompt -->
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

  <!-- terminal prompt ">"  (white chevron) -->
  <polyline
    points="150,168 248,256 150,344"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- cursor "_"  (accent blue block, sits at baseline) -->
  <rect x="284" y="312" width="104" height="42" rx="10" ry="10" fill="#3B82F6"/>
</svg>
